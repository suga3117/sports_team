spring.application.name=sports_team

spring.messages.basename=messages,ValidationMessages

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/sports_team
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=sugahara

# MyBatis
mybatis.mapper-locations=classpath*:/mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=katachi.spring.exercise.domain

#Log Level
logging.level.katachi.spring.exercise=debug