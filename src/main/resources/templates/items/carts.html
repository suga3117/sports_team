<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<meta charset="UTF-8">
	<title th:text="#{carts}"></title>
</head>
<body>
	
	<div layout:fragment="content">	
		
		<form method="post" th:action="@{/checkOrder}" th:object="${cartForm}" th:if="${not #lists.isEmpty(cartsList)}">
			<h3 th:text="${nonItemInCart}" class="text-danger"></h3>
			
			<table class="table text-center table-bordered">
				
				<thead>
					<tr>
						<td><h3 th:text="#{carts}"></h3></td>
						<td th:text="#{itemName}"></td>
						<td th:text="#{price}"></td>
						<td th:text="#{size}"></td>
						<td th:text="#{num}"></td>
						<td th:text="#{subTotal}"></td>
						<td colspan="2"></td>
					</tr>
				</thead>

				<tbody>
					<tr th:each="carts : ${cartsList}">
						<td><img class="cartItem-image" th:src="@{'/images/' + ${carts.items.image}}" th:alt="${carts.items.image}"></td>
						<td th:text="${carts.items.itemName}"></td>
						<td th:text="${carts.items.price + '円'}"></td>
						<td th:text="${carts.size}"></td>
						<td th:text="${carts.num}"></td>
						<td th:text="${carts.num  * carts.items.price + '円'}"></td>
						<input type="hidden" name="id" th:value="${carts.id}">
						<input type="hidden" name="itemId" th:value="${carts.itemId}">
						<td colspan="2">
							<a class="btn btn-primary" th:href="@{'/edit/' + ${carts.id} + '/' +${carts.itemId}}">変更</a>
							<a class="btn btn-danger" th:href="@{'/delete/' + ${carts.id}}">削除</a>
						</td>
					</tr>
				</tbody>
				
			</table>

			<div class="sumPrice">
				<p th:text="${'合計: ' + sumPrice + '円'}"></p>
				<input type="hidden" name="sumPrice" th:value="${sumPrice}">
			</div>
			
			<div class="text-center">
				<input type="submit" value="購入" class="btn btn-danger">
				<a class="btn btn-primary" th:href="@{/items}">戻る</a>
			</div>
				
		</form>
		
		<div th:if="${#lists.isEmpty(cartsList)}" class="text-danger">
			<h1>カートに商品がありません</h1>
		</div>
		
	</div>

</body>
</html>
